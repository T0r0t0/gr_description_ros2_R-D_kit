# robot control
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/gr_robot/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  ign_type_name: "ignition.msgs.Twist"
  direction: ROS_TO_IGN

# Odometry
- ros_topic_name: "/odom"
  gz_topic_name: "/model/gr_robot/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  ign_type_name: "ignition.msgs.Odometry"
  direction: IGN_TO_ROS

# Laser Scan (LiDAR)
- ros_topic_name: "/rslidar_points"
  gz_topic_name: "/model/gr_robot/lidar/points"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  ign_type_name: "ignition.msgs.PointCloudPacked"
  direction: IGN_TO_ROS

- ros_topic_name: "/rslidar_scan"
  gz_topic_name: "/model/gr_robot/lidar"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  ign_type_name: "ignition.msgs.LaserScan"
  direction: IGN_TO_ROS

